  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:26px;\">\n        <div style=\"position:relative;flex:1;min-width:240px;max-width:420px;\">\n          <span style=\"position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#5a6178;font-size:14px;pointer-events:none;\">🔍<\u002Fspan>\n          <input type=\"text\" placeholder=\"Search notes, slides, flashcards…\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" style=\"width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#e6e8f0;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px 12px 40px;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;\" style-focus=\"border-color:rgba(94,158,255,0.6);background:rgba(255,255,255,0.05);box-shadow:0 0 0 3px rgba(94,158,255,0.12);\">\n        <\u002Fdiv>\n        <div style=\"font-family:'DM Mono',monospace;font-size:11.5px;color:#5a6178;letter-spacing:0.04em;white-space:nowrap;\">{{ totalCount }} resources<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- FOLDERS -->\n    <main style=\"padding:36px 0 72px;\">\n      <sc-for list=\"{{ folders }}\" as=\"folder\" hint-placeholder-count=\"4\">\n        <section style=\"margin-bottom:38px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding-bottom:13px;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.06);\">\n            <div style=\"width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);\">{{ folder.icon }}<\u002Fdiv>\n            <span style=\"font-family:'DM Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.13em;color:#8a90a6;\">{{ folder.name }}<\u002Fspan>\n            <span style=\"margin-left:auto;font-family:'DM Mono',monospace;font-size:10.5px;color:#4a5066;letter-spacing:0.04em;\">{{ folder.count }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n            <sc-for list=\"{{ folder.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n              <a href=\"{{ item.href }}\" style=\"position:relative;display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:13px 16px;text-decoration:none;color:inherit;transition:transform .18s cubic-bezier(.2,.7,.3,1),border-color .18s,background .18s,box-shadow .18s;\" style-hover=\"{{ item.hover }}\">\n                <span style=\"{{ item.iconStyle }}\">\n                  <span style=\"{{ item.dotStyle }}\"><\u002Fspan>\n                <\u002Fspan>\n                <span style=\"flex:1;min-width:0;\">\n                  <span style=\"display:block;font-size:14.5px;font-weight:600;color:#eceef4;letter-spacing:-0.01em;\">{{ item.name }}<\u002Fspan>\n                  <span style=\"display:block;font-size:12.5px;color:#7e859c;margin-top:3px;line-height:1.4;\">{{ item.desc }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"{{ item.tagStyle }}\">{{ item.tag }}<\u002Fspan>\n              <\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-for>\n\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:60px 20px;color:#5a6178;\">\n          <div style=\"font-size:28px;margin-bottom:12px;\">🔍<\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace;font-size:13px;\">No resources match your search.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SECRET -->\n      <div style=\"margin-top:8px;text-align:right;\">\n        <a href=\"embertamer.html\" style=\"font-size:11px;color:#3a3e52;text-decoration:none;font-family:'DM Mono',monospace;transition:color .25s;\" style-hover=\"color:#ff6b6b;\">🔥 Don't click int, SOCRATES, dental/social/family history', tag:'NOTES', tags:'anamnesis history taking chief complaint hpc socrates dental social' },\n        { href:'caries.html', accent:'#ffb347', name:'Dental Caries', desc:'Aetiology, detection, ICCMS/ICDAS classification, worked cases', tag:'NOTES', tags:'caries iccms icdas classification active inactive cavitated risk worked cases' },\n        { href:'special_tests.html', accent:'#b57bee', name:'Special Tests', desc:'Pulp vitality, periapical, periodontal tests, AAE diagnoses, cases', tag:'NOTES', tags:'special tests pulp ept cold percussion palpation vitality probing aae worked cases' },\n        { href:'treatment_planning.html', accent:'#3dd68c', name:'Treatment Planning', desc:'5-phase framework, ASA, BP management, sequencing, risk', tag:'NOTES', tags:'treatment planning 5 phases systemic asa blood pressure physician consultation sequencing' },\n        { href:'radiography.html', accent:'#4a9eff', name:'Radiography', desc:'X-ray properties, dose & ALARA, bitewing/periapical/occlusal, SLOB', tag:'NOTES', tags:'radiography xray tube image quality dose alara bitewing periapical occlusal slob' },\n        { href:'occlusion.html', accent:'#f472b6', name:'Occlusion', desc:\"CR vs CO, Andrew's 6 keys, overbite/overjet, Angle's classification\", tag:'NOTES', tags:'occlusion malocclusion centric relation centric occlusion andrews 6 keys overbite overjet angle classification' },\n        { href:'infection_control.html', accent:'#3dd68c', name:'Infection Prevention & Control', desc:'Chain of infection, standard precautions, WHO 5 moments, PPE', tag:'NOTES', tags:'infection control chain of infection standard precautions who 5 moments hand hygiene ppe reprocessing aerosols' },\n        { href:'ethics_records.html', accent:'#2dd4bf', name:'Ethics, Professionalism & Records', desc:'Ethical principles, consent, record-keeping standards, ISBAR', tag:'NEW', tags:'ethics professionalism dental records consent documentation isbar problem list' },\n        { href:'red_flags.html', accent:'#ff6b6b', name:'Red Flags & Medications', desc:'Anticoagulants, MRONJ risk, safe vs liaison-required procedures', tag:'REF', tags:'red flags medications anticoagulant antiresorptive mronj bisphosphonate warfarin liaison' },\n      ]},\n      { icon:'🫦', name:'Periodontics & Endodontics · Dr Jake Ball', count:'3 notes', items:[\n        { href:'perio_endo.html', accent:'#3dd68c', name:'Perio & Endo Master Notes', desc:'7 sections: diagnosis, anatomy, aetiology, classification, histopathology, oral hygiene, chemical plaque control', tag:'7 PARTS', tags:'periodontics endodontics diagnosis anatomy periodontium aetiology classification histopathology oral hygiene chemical plaque control jake ball' },\n        { href:'perio_classification.html', accent:'#3dd68c', name:'Periodontal Classification & Diagnosis', desc:'2017 World Workshop — Stages I–IV, Grades A–C, flowchart decision tool', tag:'FLOWCHART', tags:'periodontal classification diagnosis staging grading stage grade world workshop 2017 periodontitis gingivitis flowchart' },\n        { href:'ultrasonic_devices.html', accent:'#b57bee', name:'Ultrasonic Devices', desc:'Mode of action, piezo vs magnetostrictive, peri-implant, contraindications', tag:'NOTES', tags:'ultrasonic devices piezoelectric magnetostrictive periodontal scaling peri-implant contraindications' },\n      ]},\n      { icon:'🖼️', name:'Lecture Slides', count:'7 sets · 164 slides', items:[\n        { href:'slides_EO_IO_exam.html', accent:'#2dd4bf', name:'EO/IO Examination', desc:'Soft tissue, lymph node levels I–VI, TMJ, muscles of mastication', tag:'26 slides', tags:'extraoral intraoral examination soft tissue lymph node tmj muscles' },\n        { href:'slides_radiology.html', accent:'#4a9eff', name:'Radiology', desc:'X-ray physics, bitewing/periapical technique, radiation safety', tag:'11 slides', tags:'radiology xray bitewing periapical radiation safety interpretation' },\n        { href:'slides_caries.html', accent:'#ffb347', name:'Caries Diagnosis & Classification', desc:'ICDAS staging, lesion activity, radiographic caries, discolouration', tag:'25 slides', tags:'caries classification diagnosis icdas lesion activity radiographic' },\n        { href:'slides_special_tests.html', accent:'#b57bee', name:'Special Tests', desc:'Pulp sensibility, periapical assessment, periodontal probing', tag:'30 slides', tags:'special tests pulp ept cold percussion palpation probing vitality' },\n        { href:'slides_periodontium.html', accent:'#3dd68c', name:'Periodontium Anatomy', desc:'Gingiva, PDL, cementum, alveolar bone, biologic width', tag:'25 slides', tags:'periodontium anatomy pdl cementum alveolar bone gingiva biologic width' },\n        { href:'slides_mhx.html', accent:'#ff6b6b', name:'Medical History Lecture', desc:'Organ-system history, medications, allergies, bleeding disorders', tag:'22 slides', tags:'medical history lecture organ system cardiovascular respiratory medications asa' },\n        { href:'slides_treatment_planning.html', accent:'#4a9eff', name:'Treatment Planning Lecture', desc:\"Stefanac's 5 phases, case complexity, treatment sequencing\", tag:'25 slides', tags:'treatment planning lecture 5 phases stefanac sequencing' },\n      ]},\n      { icon:'🃏', name:'Flashcards', count:'10 decks', items:[\n        { href:'flashcards.html', accent:'#f472b6', name:'Perio, Radiology & Occlusion Flashcards', desc:'10 decks — occlusion, radiography, ultrasonic, perio anatomy, aetiology, classification, histopathology, oral hygiene', tag:'10 DECKS', tags:'flashcards perio radiology occlusion ultrasonic aetiology classification histopathology oral hygiene spaced repetition' },\n      ]},\n    ];\n  }\n\n  renderVals(){\n    const q = this.state.query.toLowerCase().trim();\n    const active = q.length > 1;\n    const tileBase = 'width:40px;height:40px;flex-shrink:0;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:box-shadow .18s;';\n    const dotBase = 'width:9px;height:9px;border-radius:50%;display:block;';\n    const tagBase = \"flex-shrink:0;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.05em;padding:4px 9px;border-radius:7px;border:1px solid;white-space:nowrap;\";\n\n    const folders = this.data().map(f => {\n      const items = f.items.map(it => {\n        const a = it.accent;\n        return {\n          ...it,\n          iconStyle: tileBase + `background:${a}1a;border:1px solid ${a}30;`,\n          dotStyle: dotBase + `background:${a};box-shadow:0 0 10px ${a}cc;`,\n          tagStyle: tagBase + `color:${a};border-color:${a}55;background:${a}14;`,\n          hover: `transform:translateY(-2px);border-color:${a}77;background:rgba(255,255,255,0.04);box-shadow:0 12px 30px -14px ${a}88;`,\n        };\n      });\n      const filtered = active\n        ? items.filter(it => (it.name + ' ' + it.desc + ' ' + it.tag + ' ' + it.tags).toLowerCase().includes(q))\n        : items;\n      return { ...f, items: filtered };\n    }).filter(f => f.items.length > 0);\n\n    const totalCount = this.data().reduce((n,f) => n + f.items.length, 0);\n\n    return {\n      locked: !this.state.unlocked,\n      pwValue: this.state.pwValue,\n      pwError: this.state.pwError,\n      onPwInput: e => this.setState({ pwValue:e.target.value, pwError:'' }),\n      onPwKey: e => { if (e.key === 'Enter') this.submitPw(); },\n      submitPw: this.submitPw,\n      query: this.state.query,\n      onSearch: e => this.setState({ query:e.target.value }),\n      folders,\n      totalCount,\n      noResults: folders.length === 0,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
