   Progress saved per-deck in localStorage.
   ========================================================================= */
const DAY = 86400000;
const now = () => Date.now();

let currentDeckId = null;
let DECK = [];           // active deck's cards
let state = [];          // scheduling records for active deck
let session = [];
let current = null;
let flipped = false;
let doneCount = 0;

function storeKey(id){ return "doh256_flashcards_v1__" + id; }

function loadState(id, cards){
  let saved = {};
  try{ saved = JSON.parse(localStorage.getItem(storeKey(id))) || {}; }catch(e){}
  return cards.map((c,i)=>{
    const s = saved[i] || {};
    return { ease:s.ease??2.5, interval:s.interval??0, reps:s.reps??0, due:s.due??0, last:s.last??null };
  });
}
function saveState(){
  const out = {};
  state.forEach((s,i)=>{ out[i]=s; });
  try{ localStorage.setItem(storeKey(currentDeckId), JSON.stringify(out)); }catch(e){}
}

/* count due cards for a deck without loading it as active */
function dueCountFor(id, cards){
  const st = loadState(id, cards);
  const t = now();
  return st.filter(s=>s.due<=t).length;
}

function rate(r){
  const s = state[current];
  let label;
  switch(r){
    case 1: s.reps++; s.ease=Math.min(3.0,s.ease+0.15);
      s.interval = s.interval<1 ? 4 : Math.round(s.interval*s.ease*1.3); label="easy"; break;
    case 2: s.reps++;
      s.interval = s.interval<1 ? 1 : Math.round(s.interval*s.ease); label="medium"; break;
    case 3: s.reps++; s.ease=Math.max(1.3,s.ease-0.15);
      s.interval = s.interval<1 ? 1 : Math.max(1,Math.round(s.interval*1.2)); label="hard"; break;
    case 4: s.ease=Math.max(1.3,s.ease-0.2); s.interval=0; s.reps=0; label="again"; break;
  }
  s.last=label;
  s.due = s.interval>0 ? now()+s.interval*DAY : now();
  saveState();
  doneCount++;
  if(r===4){ const pos=Math.min(session.length,3); session.splice(pos,0,current); }
  next(); renderStats(); renderList();
}

function buildSession(){
  const t=now();
  session = state.map((s,i)=>({i,s}))
    .filter(x=>x.s.due<=t)
    .sort((a,b)=>order(a.s.last)-order(b.s.last))
    .map(x=>x.i);
  doneCount=0;
}
function order(label){ return ({again:0,hard:1,medium:2,new:3,easy:4})[label] ?? 3; }

function shuffle(){
  for(let k=session.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [session[k],session[j]]=[session[j],session[k]]; }
  next();
}
function next(){
  flipped=false;
  if(session.length===0){ current=null; renderEmpty(); return; }
  current=session.shift(); renderCard();
}

function previewInterval(r){
  const s=state[current]; let iv;
  switch(r){
    case 1: iv = s.interval<1 ? 4 : Math.round(s.interval*Math.min(3.0,s.ease+0.15)*1.3); break;
    case 2: iv = s.interval<1 ? 1 : Math.round(s.interval*s.ease); break;
    case 3: iv = s.interval<1 ? 1 : Math.max(1,Math.round(s.interval*1.2)); break;
    case 4: return "soon";
  }
  if(iv<1) return "<1d";
  if(iv<30) return iv+"d";
  if(iv<365) return Math.round(iv/30)+"mo";
  return (iv/365).toFixed(1)+"y";
}

/* ============================ RENDERING ============================ */
const cardEl=document.getElementById('card');
const ratingsEl=document.getElementById('ratings');

function renderCard(){
  const c=DECK[current];
  const tag=c.tags?`<div class="card-tag">${c.tags}</div>`:"";
  if(!flipped){
    cardEl.innerHTML=`${tag}
      <div class="face"><div class="face-label">Question</div>
      <div class="face-text">${c.front}</div>
      ${c.frontImage?`<img src="${c.frontImage}" alt="">`:""}</div>
      <div class="flip-hint">click or press space to reveal</div>`;
    ratingsEl.classList.add('hidden');
  } else {
    cardEl.innerHTML=`${tag}
      <div class="face">
        <div class="face-label">Question</div>
        <div class="face-text" style="font-size:1.1rem;color:var(--ink-soft)">${c.front}</div>
        ${c.frontImage?`<img src="${c.frontImage}" alt="">`:""}
        <hr class="divider">
        <div class="face-label">Answer</div>
        <div class="face-text answer">${c.back}</div>
        ${c.backImage?`<img src="${c.backImage}" alt="">`:""}
      </div>`;
    ratingsEl.classList.remove('hidden');
    document.getElementById('w1').textContent=previewInterval(1);
    document.getElementById('w2').textContent=previewInterval(2);
    document.getElementById('w3').textContent=previewInterval(3);
    document.getElementById('w4').textContent=previewInterval(4);
  }
}
function renderEmpty(){
  ratingsEl.classList.add('hidden');
  cardEl.innerHTML=`<div class="empty-msg">
    <div class="big">All caught up 🎉</div>
    <div>You've reviewed every card due in this deck right now.</div>
    <div style="margin-top:1rem"><button id="studyAllBtn">Study all ${DECK.length} cards again</button></div>
  </div>`;
  document.getElementById('studyAllBtn').onclick=()=>{ session=DECK.map((_,i)=>i); shuffle(); };
}
function flip(){ if(current===null) return; flipped=!flipped; renderCard(); }

function renderStats(){
  document.getElementById('stat-due').textContent=session.length;
  document.getElementById('stat-done').textContent=doneCount;
  document.getElementById('stat-total').textContent=DECK.length;
}

function renderList(filter=""){
  const box=document.getElementById('listItems');
  const f=filter.trim().toLowerCase();
  box.innerHTML=DECK.map((c,i)=>{
    const text=(c.front+" "+c.back+" "+(c.tags||"")).toLowerCase();
    if(f && !text.includes(f)) return "";
    const s=state[i];
    const status=s.last||"new";
    const ivLabel = s.due===0 ? "new" : (s.interval<1?"due":s.interval+"d");
    return `<div class="list-item">
      <div class="li-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="li-dot s-${status}"></span>
        <span class="li-q">${c.front}</span>
        <span class="li-meta">${c.tags||""} · ${ivLabel}</span>
      </div>
      <div class="li-body">
        ${c.frontImage?`<img src="${c.frontImage}" alt="">`:""}
        <b>A:</b> ${c.back}
        ${c.backImage?`<img src="${c.backImage}" alt="">`:""}
      </div></div>`;
  }).join("");
}

/* ====================== DECK PICKER ====================== */
/* Section definitions: order, title, and the colour of the section dot.
   Decks are placed into sections by their `group` field. */
const SECTIONS = [
  { group:"General",      title:"General & Clinical",  color:"#185FA5" },
  { group:"Periodontics", title:"Periodontics — Dr Jake Ball", color:"#c0392b" },
];

function deckCardHTML(id, d){
  const due=dueCountFor(id,d.cards);
  const col=d.color||"var(--accent)";
  return `<button class="deck-card" style="--dk:${col}" onclick="openDeck('${id}')">
    <div class="dk-cat">${d.category||""}</div>
    <div class="dk-name">${d.name}</div>
    <div class="dk-meta">
      <span>${d.cards.length} cards</span>
      ${due>0?`<span class="dk-due">${due} due</span>`:`<span>all reviewed</span>`}
    </div>
  </button>`;
}

function renderPicker(){
  const picker=document.getElementById('picker');
  let html="";
  const placed=new Set();

  SECTIONS.forEach(sec=>{
    const entries=Object.entries(DECKS).filter(([id,d])=>(d.group||"General")===sec.group);
    if(entries.length===0) return;
    const cardCount=entries.reduce((n,[,d])=>n+d.cards.length,0);
    html+=`<div class="section-head">
      <span class="sh-dot" style="background:${sec.color}"></span>
      <span class="sh-title">${sec.title}</span>
      <span class="sh-rule"></span>
      <span class="sh-count">${entries.length} decks · ${cardCount} cards</span>
    </div>
    <div class="deck-grid">${entries.map(([id,d])=>{ placed.add(id); return deckCardHTML(id,d); }).join("")}</div>`;
  });

  /* any deck whose group isn't in SECTIONS still gets shown */
  const leftovers=Object.entries(DECKS).filter(([id])=>!placed.has(id));
  if(leftovers.length){
    html+=`<div class="section-head"><span class="sh-dot" style="background:var(--ink-faint)"></span>
      <span class="sh-title">Other</span><span class="sh-rule"></span></div>
      <div class="deck-grid">${leftovers.map(([id,d])=>deckCardHTML(id,d)).join("")}</div>`;
  }
  picker.innerHTML=html;
}

function openDeck(id){
  currentDeckId=id;
  DECK=DECKS[id].cards;
  state=loadState(id,DECK);
  /* theme the study view with this deck's colour */
  document.documentElement.style.setProperty('--accent', DECKS[id].color || '#b5491f');
  buildSession();
  if(session.length===0) session=DECK.map((_,i)=>i);
  document.getElementById('subtitle').textContent=DECKS[id].name;
  document.getElementById('stats').style.display='flex';
  document.getElementById('picker').classList.add('hidden');
  document.getElementById('study').classList.remove('hidden');
  document.getElementById('listToggle').classList.remove('open');
  document.getElementById('cardList').classList.remove('open');
  document.getElementById('listSearch').value="";
  shuffle(); renderStats(); renderList();
  window.scrollTo(0,0);
}
function backToPicker(){
  document.documentElement.style.setProperty('--accent', '#b5491f');
  document.getElementById('study').classList.add('hidden');
  document.getElementById('picker').classList.remove('hidden');
  document.getElementById('stats').style.display='none';
  document.getElementById('subtitle').textContent='choose a deck to begin';
  renderPicker();
  window.scrollTo(0,0);
}

/* ============================ EVENTS ============================ */
cardEl.addEventListener('click',flip);
document.getElementById('flipBtn').onclick=flip;
document.getElementById('shuffleBtn').onclick=()=>{ if(session.length) shuffle(); };
document.getElementById('backBtn').onclick=backToPicker;
document.getElementById('resetBtn').onclick=()=>{
  if(confirm("Reset progress for this deck? This clears your ratings and schedule for "+DECKS[currentDeckId].name+".")){
    localStorage.removeItem(storeKey(currentDeckId));
    state=loadState(currentDeckId,DECK);
    buildSession(); if(session.length===0) session=DECK.map((_,i)=>i);
    shuffle(); renderStats(); renderList();
  }
};
ratingsEl.querySelectorAll('.rate-btn').forEach(b=>
  b.onclick=()=>{ if(flipped) rate(parseInt(b.dataset.r)); });
document.getElementById('listToggle').onclick=function(){
  this.classList.toggle('open');
  document.getElementById('cardList').classList.toggle('open');
};
document.getElementById('listSearch').addEventListener('input',e=>renderList(e.target.value));
document.addEventListener('keydown',e=>{
  if(document.getElementById('study').classList.contains('hidden')) return;
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){ e.preventDefault(); flip(); }
  else if(e.key==='s'||e.key==='S'){ if(session.length) shuffle(); }
  else if(['1','2','3','4'].includes(e.key) && flipped) rate(parseInt(e.key));
});

/* ============================ INIT ============================ */
renderPicker();
</script>
